<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
</head>
<body>

    <section class="spacer"></section>
    
    <section class="poem-section" id="poem-section">
        <div class="poem-wrapper">
        <h1 class="poem-title"> Disentimientos de la nación</h1>
        <p>Javier Raya</p>
        

            <!-- primero verso-->
        <div class="poem-line">
            <span class="poem-text">
                Disiento cuando dejo de creer en tu himno 
            </span>
            <span class="poem-mask"></span>
        </div>


<!-- segundo verso-->
       
        <div class="poem-line">
            <span class="poem-text">
               no, patria, no soy un soldado que en cada hijo te dio,
            </span>
            <span class="poem-mask"></span>
        </div>

<!-- tercero verso-->

        <div class="poem-line">
            <span class="poem-text">
               no soy un hijo de ningún concepto nacional
            </span>
            <span class="poem-mask"></span>
        </div>

        <!-- cuarto verso-->
        <div class="poem-line">
            <span class="poem-text">
               aunque retumben en sus centros la tierra, Masiosare,
            </span>
            <span class="poem-mask"></span>
        </div>

        <!-- quinto verso-->

        <div class="poem-line">
            <span class="poem-text">
               porque no puedo estar a favor de tanto
            </span>
            <span class="poem-mask"></span>
        </div>

        <!-- sexto verso-->

         <div class="poem-line">
            <span class="poem-text">
              bélico acento.
            </span>
            <span class="poem-mask"></span>
        </div>
        
        </div>
    </section>

    

        <section class="spacer"></section>
        <script src="script.js"> </script>



</body>
</html>
